<!doctype html>
<html lang="en">
  <head>
    <!-- ===== PRIMARY META TAGS ===== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== TITLE TAG (Critical for SEO) ===== -->
    <title>Ocean Peak Logistics | Secure Logistics </title>

    <!-- ===== META DESCRIPTION (Appears in search results) ===== -->
    <meta 
      name="description" 
      content="Ocean Peak Logistics provides secure, reliable freight forwarding and supply chain management worldwide. Get real-time tracking, customs clearance, and dedicated support." 
    />

    <!-- ===== META KEYWORDS (Optional but still used by some engines) ===== -->
    <meta 
      name="keywords" 
      content="logistics, freight forwarding, supply chain, secure shipping, ocean freight, air cargo, customs brokerage, warehouse, distribution, global logistics" 
    />

    <!-- ===== ROBOTS (Controls search engine crawling) ===== -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- ===== AUTHOR & PUBLISHER ===== -->
    <meta name="author" content="Ocean Peak Logistics" />
    <meta name="publisher" content="Ocean Peak Logistics" />

    <!-- ===== OPEN GRAPH (Social sharing - Facebook, LinkedIn) ===== -->
    <meta property="og:title" content="Ocean Peak Logistics | Secure Freight & Supply Chain Solutions" />
    <meta property="og:description" content="Reliable freight forwarding, customs clearance, and real-time tracking for businesses worldwide." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.oceanpeaklogistics.com/" />
    <meta property="og:image" content="https://www.oceanpeaklogistics.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Ocean Peak Logistics" />

    <!-- ===== TWITTER CARD (Social sharing - Twitter) ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ocean Peak Logistics | Secure Freight & Supply Chain Solutions" />
    <meta name="twitter:description" content="Reliable freight forwarding, customs clearance, and real-time tracking for businesses worldwide." />
    <meta name="twitter:image" content="https://www.oceanpeaklogistics.com/twitter-image.jpg" />
    <meta name="twitter:site" content="@OceanPeakLog" />
    <meta name="twitter:creator" content="@OceanPeakLog" />

    <!-- ===== CANONICAL URL (Prevents duplicate content issues) ===== -->
    <link rel="canonical" href="https://www.oceanpeaklogistics.com/" />

    <!-- ===== STRUCTURED DATA (JSON-LD - Rich Snippets) ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Ocean Peak Logistics",
        "description": "Secure freight forwarding and supply chain management solutions worldwide.",
        "url": "https://www.oceanpeaklogistics.com/",
        "logo": "https://www.oceanpeaklogistics.com/logo.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+1-800-555-0199",
          "contactType": "Customer Service",
          "availableLanguage": ["English", "Spanish"]
        },
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Harbor Drive",
          "addressLocality": "Miami",
          "addressRegion": "FL",
          "postalCode": "33101",
          "addressCountry": "US"
        },
        "sameAs": [
          "https://www.facebook.com/oceanpeaklogistics",
          "https://www.linkedin.com/company/oceanpeaklogistics",
          "https://twitter.com/OceanPeakLog"
        ]
      }
    </script>

    <!-- ===== ADDITIONAL STRUCTURED DATA (Breadcrumb) ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://www.oceanpeaklogistics.com/"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Services",
            "item": "https://www.oceanpeaklogistics.com/services"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": "Contact",
            "item": "https://www.oceanpeaklogistics.com/contact"
          }
        ]
      }
    </script>

    <!-- ===== MOBILE-FRIENDLY (Google's mobile-first indexing) ===== -->
    <meta name="theme-color" content="#1a3a5c" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ===== PRELOAD CRITICAL ASSETS (Performance SEO) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />

    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
